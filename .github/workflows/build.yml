name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Даём права на выполнение gradlew внутри папки galya
      - name: Grant execute permission
        run: chmod +x galya/gradlew

      # Собираем APK (работаем внутри galya)
      - name: Build Debug APK
        run: |
          cd galya
          ./gradlew assembleDebug --stacktrace

      # Загружаем APK (путь внутри galya)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: galya/app/build/outputs/apk/debug/app-debug.apk
