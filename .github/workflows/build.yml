name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Указываем, где искать gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Переходим в папку проекта и запускаем сборку
      - name: Build Debug APK
        run: |
          cd galya
          ../gradlew assembleDebug --stacktrace

      # Диагностика: покажет, где лежит APK
      - name: 🔍 Find APK
        run: |
          echo "=== APK files ==="
          find . -name "*.apk"

      # Загружаем APK из правильной папки
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: galya/app/build/outputs/apk/debug/app-debug.apk
